<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Lupas dentales: guia de magnificacion</text>
  <rect x="250" y="60" width="700" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- 3-column optical systems -->
  <text x="600" y="95" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">SISTEMAS OPTICOS</text>

  <!-- Galilean -->
  <rect x="40" y="110" width="360" height="145" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="220" y="136" fill="#22c55e" font-size="15" font-weight="800" text-anchor="middle">Galileano</text>
  <text x="220" y="156" fill="#94a3b8" font-size="12" text-anchor="middle">2.0x - 3.5x magnificacion</text>
  <rect x="60" y="166" width="320" height="1" fill="#334155"/>
  <text x="60" y="186" fill="#e2e8f0" font-size="12">Ligero y compacto</text>
  <text x="60" y="204" fill="#e2e8f0" font-size="12">Campo de vision amplio</text>
  <text x="60" y="222" fill="#e2e8f0" font-size="12">Economico — ideal para iniciar</text>
  <text x="60" y="244" fill="#64748b" font-size="11">Limitacion: distorsion periferica &gt;3x</text>

  <!-- Prismatic -->
  <rect x="420" y="110" width="360" height="145" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="600" y="136" fill="#38bdf8" font-size="15" font-weight="800" text-anchor="middle">Prismatico / Kepleriano</text>
  <text x="600" y="156" fill="#94a3b8" font-size="12" text-anchor="middle">4.0x - 8.0x magnificacion</text>
  <rect x="440" y="166" width="320" height="1" fill="#334155"/>
  <text x="440" y="186" fill="#e2e8f0" font-size="12">Optica superior, imagen nitida</text>
  <text x="440" y="204" fill="#e2e8f0" font-size="12">Mayor profundidad de campo</text>
  <text x="440" y="222" fill="#e2e8f0" font-size="12">Ideal para endodoncia y micro</text>
  <text x="440" y="244" fill="#64748b" font-size="11">Limitacion: mas peso, precio elevado</text>

  <!-- Ergonomic -->
  <rect x="800" y="110" width="360" height="145" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="980" y="136" fill="#a855f7" font-size="15" font-weight="800" text-anchor="middle">Ergonomico</text>
  <text x="980" y="156" fill="#94a3b8" font-size="12" text-anchor="middle">Posicion cervical neutra</text>
  <rect x="820" y="166" width="320" height="1" fill="#334155"/>
  <text x="820" y="186" fill="#e2e8f0" font-size="12">Angulo de declinacion optimizado</text>
  <text x="820" y="204" fill="#e2e8f0" font-size="12">Previene dolor cervical cronico</text>
  <text x="820" y="222" fill="#e2e8f0" font-size="12">Ultima generacion (Admetec, ExamVision)</text>
  <text x="820" y="244" fill="#64748b" font-size="11">Limitacion: precio premium, menos opciones</text>

  <!-- Mounting: TTL vs Flip-up -->
  <rect x="40" y="270" width="555" height="38" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="60" y="295" fill="#f59e0b" font-size="13" font-weight="700">MONTAJE:</text>
  <text x="145" y="295" fill="#22c55e" font-size="13" font-weight="700">TTL (custom, ligero, preciso)</text>
  <text x="395" y="295" fill="#94a3b8" font-size="13">vs</text>
  <text x="425" y="295" fill="#38bdf8" font-size="13" font-weight="700">Flip-up (versatil, ajustable)</text>

  <!-- Magnification by specialty -->
  <text x="600" y="335" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">MAGNIFICACION RECOMENDADA POR ESPECIALIDAD</text>

  <rect x="40" y="350" width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="150" y="375" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">General</text>
  <text x="150" y="398" fill="#22c55e" font-size="22" font-weight="800" text-anchor="middle">2.5x</text>

  <rect x="280" y="350" width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="375" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Operatoria</text>
  <text x="390" y="398" fill="#38bdf8" font-size="22" font-weight="800" text-anchor="middle">3.0x - 3.5x</text>

  <rect x="520" y="350" width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="630" y="375" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Cirugia</text>
  <text x="630" y="398" fill="#a855f7" font-size="22" font-weight="800" text-anchor="middle">3.5x+</text>

  <rect x="760" y="350" width="220" height="70" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="870" y="375" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Endodoncia</text>
  <text x="870" y="398" fill="#f59e0b" font-size="22" font-weight="800" text-anchor="middle">4.0x+</text>

  <rect x="1000" y="350" width="160" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1080" y="375" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Micro</text>
  <text x="1080" y="398" fill="#ef4444" font-size="22" font-weight="800" text-anchor="middle">6.0x+</text>

  <!-- Price tier bands -->
  <text x="600" y="455" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">RANGOS DE PRECIO EN CHILE (CLP)</text>

  <!-- Budget -->
  <rect x="40" y="470" width="350" height="75" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="495" fill="#94a3b8" font-size="12" font-weight="700">ENTRADA</text>
  <text x="60" y="517" fill="#e2e8f0" font-size="18" font-weight="800">$16.000 - $50.000</text>
  <text x="60" y="536" fill="#64748b" font-size="11">AliExpress, generico — sin garantia optica</text>

  <!-- Mid -->
  <rect x="420" y="470" width="350" height="75" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="440" y="495" fill="#38bdf8" font-size="12" font-weight="700">PROFESIONAL</text>
  <text x="440" y="517" fill="#e2e8f0" font-size="18" font-weight="800">$300.000 - $500.000</text>
  <text x="440" y="536" fill="#64748b" font-size="11">Orascoptic, Univet — mejor relacion precio/calidad</text>

  <!-- Premium -->
  <rect x="800" y="470" width="360" height="75" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="820" y="495" fill="#a855f7" font-size="12" font-weight="700">PREMIUM</text>
  <text x="820" y="517" fill="#e2e8f0" font-size="18" font-weight="800">$800.000 - $2.000.000+</text>
  <text x="820" y="536" fill="#64748b" font-size="11">Zeiss, Designs for Vision, ExamVision, Admetec</text>

  <!-- Daily cost callout -->
  <rect x="40" y="555" width="1120" height="30" rx="6" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1"/>
  <text x="600" y="575" fill="#38bdf8" font-size="13" font-weight="700" text-anchor="middle">Lupa de $500.000 a 5 anos = menos de $300 CLP/dia — la herramienta con mayor ROI en odontologia</text>

  <!-- Footer branding -->
  <rect x="0" y="600" width="1200" height="100" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="620" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="646" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="644" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="644" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="644" fill="#475569" font-size="11" text-anchor="end">Fuentes: Woodall et al. 2022 · 3M Ergonomic Solutions · ExamVision</text>

  <!-- Key insight -->
  <rect x="40" y="665" width="1120" height="28" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="684" fill="#94a3b8" font-size="12" text-anchor="middle">No comprar por precio: elegir por magnificacion necesaria, ergonomia y calidad optica. TTL para uso diario, Flip-up si comparte entre colegas.</text>
</svg>
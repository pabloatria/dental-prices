<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Anestesicos Dentales: Comparativa de Precios (caja 50 carpules)</text>
  <rect x="150" y="60" width="900" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Three columns -->
  <!-- Column 1: Lidocaina -->
  <rect x="40" y="90" width="360" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Column header -->
  <rect x="40" y="90" width="360" height="52" rx="12" fill="#0ea5e9" opacity="0.1"/>
  <text x="220" y="114" fill="#38bdf8" font-size="18" font-weight="800" text-anchor="middle">Lidocaina 2%</text>
  <text x="220" y="132" fill="#64748b" font-size="11" text-anchor="middle">+ Epinefrina 1:100.000</text>

  <!-- Clinical indication -->
  <rect x="60" y="155" width="320" height="36" rx="6" fill="#0ea5e9" opacity="0.06"/>
  <text x="220" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">Uso: Procedimientos de rutina</text>
  <text x="220" y="184" fill="#94a3b8" font-size="11" text-anchor="middle">Gold standard · Mayor seguridad cardiovascular</text>

  <!-- Lidocaina brands -->
  <rect x="60" y="205" width="320" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="80" y="228" fill="#e2e8f0" font-size="14" font-weight="700">Maver (Lidocaina)</text>
  <text x="80" y="248" fill="#64748b" font-size="12">Chile</text>
  <text x="360" y="238" fill="#22c55e" font-size="15" font-weight="800" text-anchor="end">$22.510–$26.400</text>

  <rect x="60" y="275" width="320" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="80" y="298" fill="#e2e8f0" font-size="14" font-weight="700">Zeyco</text>
  <text x="80" y="318" fill="#64748b" font-size="12">Mexico</text>
  <text x="360" y="308" fill="#22c55e" font-size="15" font-weight="800" text-anchor="end">$22.490</text>

  <rect x="60" y="345" width="320" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="80" y="368" fill="#e2e8f0" font-size="14" font-weight="700">DFL Alphacaine</text>
  <text x="80" y="388" fill="#64748b" font-size="12">Brasil</text>
  <text x="360" y="378" fill="#f59e0b" font-size="15" font-weight="800" text-anchor="end">$27.710–$31.100</text>

  <!-- Lidocaina range -->
  <rect x="60" y="420" width="320" height="36" rx="6" fill="#22c55e" opacity="0.08"/>
  <text x="220" y="443" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">Rango: $22.490 – $31.100</text>

  <!-- Column divider -->
  <line x1="415" y1="100" x2="415" y2="500" stroke="#334155" stroke-width="0.5" opacity="0.5"/>

  <!-- Column 2: Articaina -->
  <rect x="420" y="90" width="360" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <rect x="420" y="90" width="360" height="52" rx="12" fill="#f59e0b" opacity="0.1"/>
  <text x="600" y="114" fill="#f59e0b" font-size="18" font-weight="800" text-anchor="middle">Articaina 4%</text>
  <text x="600" y="132" fill="#64748b" font-size="11" text-anchor="middle">+ Epinefrina 1:100.000</text>

  <rect x="440" y="155" width="320" height="36" rx="6" fill="#f59e0b" opacity="0.06"/>
  <text x="600" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">Uso: Mandibula posterior, endodoncia</text>
  <text x="600" y="184" fill="#94a3b8" font-size="11" text-anchor="middle">Mayor difusion osea · Inicio rapido</text>

  <rect x="440" y="205" width="320" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="460" y="228" fill="#e2e8f0" font-size="14" font-weight="700">DFL Articaine</text>
  <text x="460" y="248" fill="#64748b" font-size="12">Brasil</text>
  <text x="740" y="238" fill="#f59e0b" font-size="15" font-weight="800" text-anchor="end">$44.590</text>

  <rect x="440" y="275" width="320" height="60" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="298" fill="#e2e8f0" font-size="14" font-weight="700">Septanest (Septodont)</text>
  <text x="460" y="318" fill="#64748b" font-size="12">Francia</text>
  <text x="740" y="308" fill="#ef4444" font-size="15" font-weight="800" text-anchor="end">$44.890–$60.200</text>

  <!-- Variance callout -->
  <rect x="440" y="350" width="320" height="56" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="600" y="374" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">Septanest: $15.310 de varianza</text>
  <text x="600" y="392" fill="#94a3b8" font-size="11" text-anchor="middle">entre proveedores por la misma caja</text>

  <!-- Articaina range -->
  <rect x="440" y="420" width="320" height="36" rx="6" fill="#f59e0b" opacity="0.08"/>
  <text x="600" y="443" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">Rango: $44.590 – $60.200</text>

  <!-- Column divider -->
  <line x1="795" y1="100" x2="795" y2="500" stroke="#334155" stroke-width="0.5" opacity="0.5"/>

  <!-- Column 3: Mepivacaina -->
  <rect x="800" y="90" width="360" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <rect x="800" y="90" width="360" height="52" rx="12" fill="#a855f7" opacity="0.1"/>
  <text x="980" y="114" fill="#a855f7" font-size="18" font-weight="800" text-anchor="middle">Mepivacaina 3%</text>
  <text x="980" y="132" fill="#64748b" font-size="11" text-anchor="middle">Sin vasoconstrictor</text>

  <rect x="820" y="155" width="320" height="36" rx="6" fill="#a855f7" opacity="0.06"/>
  <text x="980" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">Uso: Pacientes cardiovasculares</text>
  <text x="980" y="184" fill="#94a3b8" font-size="11" text-anchor="middle">Sin epinefrina · Duracion mas corta</text>

  <rect x="820" y="205" width="320" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="840" y="228" fill="#e2e8f0" font-size="14" font-weight="700">Novocol (Mepivacaina)</text>
  <text x="840" y="248" fill="#64748b" font-size="12">Canada</text>
  <text x="1120" y="238" fill="#a855f7" font-size="15" font-weight="800" text-anchor="end">$34.880–$42.900</text>

  <rect x="820" y="275" width="320" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="840" y="298" fill="#e2e8f0" font-size="14" font-weight="700">DFL Mepisv</text>
  <text x="840" y="318" fill="#64748b" font-size="12">Brasil</text>
  <text x="1120" y="308" fill="#a855f7" font-size="15" font-weight="800" text-anchor="end">$35.810–$38.500</text>

  <!-- Mepivacaina range -->
  <rect x="820" y="420" width="320" height="36" rx="6" fill="#a855f7" opacity="0.08"/>
  <text x="980" y="443" fill="#a855f7" font-size="13" font-weight="700" text-anchor="middle">Rango: $34.880 – $42.900</text>

  <!-- Bottom summary -->
  <rect x="40" y="525" width="1120" height="48" rx="8" fill="#0ea5e9" opacity="0.06" stroke="#0ea5e9" stroke-width="1"/>
  <text x="600" y="548" fill="#38bdf8" font-size="14" font-weight="700" text-anchor="middle">Lidocaina 2%: desde $22.490/caja · Articaina 4%: desde $44.590/caja · Mepivacaina 3% s/v: desde $34.880/caja</text>
  <text x="600" y="566" fill="#94a3b8" font-size="12" text-anchor="middle">Comparar entre 3+ proveedores puede ahorrar hasta $15.000 por caja en articaina</text>

  <!-- Footer branding -->
  <rect x="0" y="590" width="1200" height="110" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="620" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="646" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="644" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="644" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="644" fill="#475569" font-size="11" text-anchor="end">Fuentes: Proveedores dentales Chile · dentalprecios.cl</text>

  <rect x="40" y="665" width="1120" height="28" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="684" fill="#94a3b8" font-size="12" text-anchor="middle">Lidocaina para rutina · Articaina para casos complejos · Mepivacaina sin epi para pacientes de riesgo cardiovascular</text>
</svg>
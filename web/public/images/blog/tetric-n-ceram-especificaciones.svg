<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Tetric N-Ceram: especificaciones y linea de productos</text>
  <rect x="200" y="60" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Product card: key specs -->
  <rect x="40" y="80" width="700" height="170" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="60" y="108" fill="#22c55e" font-size="18" font-weight="800">Tetric N-Ceram</text>
  <text x="280" y="108" fill="#94a3b8" font-size="14">Ivoclar Vivadent</text>
  <text x="60" y="130" fill="#64748b" font-size="13">Resina compuesta nanohibrida de restauracion directa</text>

  <rect x="60" y="142" width="660" height="1" fill="#334155"/>

  <!-- Spec grid -->
  <text x="80" y="166" fill="#94a3b8" font-size="11" font-weight="600">RELLENO (vol.)</text>
  <text x="80" y="184" fill="#e2e8f0" font-size="14" font-weight="700">63.5%</text>

  <text x="220" y="166" fill="#94a3b8" font-size="11" font-weight="600">TIPO RELLENO</text>
  <text x="220" y="184" fill="#e2e8f0" font-size="12">Vidrio bario, YbF3</text>
  <text x="220" y="200" fill="#e2e8f0" font-size="12">Oxidos mixtos, prepolimeros</text>

  <text x="420" y="166" fill="#94a3b8" font-size="11" font-weight="600">RADIOPACIDAD</text>
  <text x="420" y="184" fill="#e2e8f0" font-size="14" font-weight="700">250% Al</text>

  <text x="560" y="166" fill="#94a3b8" font-size="11" font-weight="600">CONSISTENCIA</text>
  <text x="560" y="184" fill="#e2e8f0" font-size="12">Non-sticky</text>
  <text x="560" y="200" fill="#e2e8f0" font-size="12">Modelado superior</text>

  <text x="80" y="226" fill="#94a3b8" font-size="11" font-weight="600">INDICACIONES</text>
  <text x="80" y="242" fill="#e2e8f0" font-size="12">Clase I-V directas · Ferulizacion · Reconstruccion de munones · Carillas directas</text>

  <!-- Key differentiator badge -->
  <rect x="760" y="80" width="400" height="170" rx="12" fill="#0f172a" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="960" y="108" fill="#38bdf8" font-size="14" font-weight="800" text-anchor="middle">DIFERENCIAL CLAVE</text>
  <rect x="780" y="118" width="360" height="1" fill="#334155"/>

  <text x="960" y="142" fill="#e2e8f0" font-size="13" text-anchor="middle">Consistencia no pegajosa</text>
  <text x="960" y="162" fill="#e2e8f0" font-size="13" text-anchor="middle">que permite esculpir anatomia</text>
  <text x="960" y="182" fill="#e2e8f0" font-size="13" text-anchor="middle">sin arrastre del instrumento.</text>

  <text x="960" y="210" fill="#94a3b8" font-size="12" text-anchor="middle">Ranking clinicos: #1 en manejo</text>
  <text x="960" y="230" fill="#94a3b8" font-size="12" text-anchor="middle">entre nano-hibridas en encuestas 2024</text>

  <!-- Product line: 4 variants -->
  <text x="600" y="285" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">LINEA TETRIC N-CERAM</text>

  <!-- Standard -->
  <rect x="40" y="300" width="270" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="175" y="326" fill="#22c55e" font-size="14" font-weight="800" text-anchor="middle">N-Ceram</text>
  <text x="175" y="346" fill="#94a3b8" font-size="12" text-anchor="middle">Estandar</text>
  <rect x="60" y="354" width="230" height="1" fill="#334155"/>
  <text x="175" y="374" fill="#e2e8f0" font-size="12" text-anchor="middle">Incrementos de 2mm</text>
  <text x="175" y="392" fill="#e2e8f0" font-size="12" text-anchor="middle">Uso universal ant. y post.</text>
  <text x="175" y="420" fill="#64748b" font-size="11" text-anchor="middle">$18.000 - $30.000 / jeringa</text>

  <!-- Bulk Fill -->
  <rect x="330" y="300" width="270" height="130" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="465" y="326" fill="#38bdf8" font-size="14" font-weight="800" text-anchor="middle">Bulk Fill</text>
  <text x="465" y="346" fill="#94a3b8" font-size="12" text-anchor="middle">Alto volumen</text>
  <rect x="350" y="354" width="230" height="1" fill="#334155"/>
  <text x="465" y="374" fill="#e2e8f0" font-size="12" text-anchor="middle">Incrementos de 4mm</text>
  <text x="465" y="392" fill="#e2e8f0" font-size="12" text-anchor="middle">Posterior Clase I y II</text>
  <text x="465" y="420" fill="#64748b" font-size="11" text-anchor="middle">$20.000 - $35.000 / jeringa</text>

  <!-- PowerFill -->
  <rect x="620" y="300" width="270" height="130" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="755" y="326" fill="#a855f7" font-size="14" font-weight="800" text-anchor="middle">PowerFill</text>
  <text x="755" y="346" fill="#94a3b8" font-size="12" text-anchor="middle">Alta resistencia</text>
  <rect x="640" y="354" width="230" height="1" fill="#334155"/>
  <text x="755" y="374" fill="#e2e8f0" font-size="12" text-anchor="middle">4mm + curado rapido 3s</text>
  <text x="755" y="392" fill="#e2e8f0" font-size="12" text-anchor="middle">Posterior carga elevada</text>
  <text x="755" y="420" fill="#64748b" font-size="11" text-anchor="middle">$22.000 - $38.000 / jeringa</text>

  <!-- EvoFlow -->
  <rect x="910" y="300" width="250" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1035" y="326" fill="#f59e0b" font-size="14" font-weight="800" text-anchor="middle">EvoFlow</text>
  <text x="1035" y="346" fill="#94a3b8" font-size="12" text-anchor="middle">Fluida</text>
  <rect x="930" y="354" width="210" height="1" fill="#334155"/>
  <text x="1035" y="374" fill="#e2e8f0" font-size="12" text-anchor="middle">Liner, sellantes, Clase V</text>
  <text x="1035" y="392" fill="#e2e8f0" font-size="12" text-anchor="middle">Adaptacion a paredes</text>
  <text x="1035" y="420" fill="#64748b" font-size="11" text-anchor="middle">$16.000 - $28.000 / jeringa</text>

  <!-- Competitive positioning -->
  <text x="600" y="465" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">POSICIONAMIENTO vs COMPETENCIA</text>

  <!-- Comparison table -->
  <rect x="100" y="480" width="1000" height="36" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="250" y="503" fill="#64748b" font-size="12" text-anchor="middle">Atributo</text>
  <text x="500" y="503" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">Tetric N-Ceram</text>
  <text x="730" y="503" fill="#38bdf8" font-size="13" font-weight="700" text-anchor="middle">Filtek Z350 XT</text>
  <text x="960" y="503" fill="#a855f7" font-size="13" font-weight="700" text-anchor="middle">Harmonize</text>

  <rect x="100" y="516" width="1000" height="30" rx="0" fill="#1e293b" opacity="0.5"/>
  <text x="250" y="536" fill="#94a3b8" font-size="12" text-anchor="middle">Manejo</text>
  <text x="500" y="536" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">Superior</text>
  <text x="730" y="536" fill="#94a3b8" font-size="13" text-anchor="middle">Bueno</text>
  <text x="960" y="536" fill="#94a3b8" font-size="13" text-anchor="middle">Muy bueno</text>

  <rect x="100" y="546" width="1000" height="30" rx="0" fill="#0f172a" opacity="0.3"/>
  <text x="250" y="566" fill="#94a3b8" font-size="12" text-anchor="middle">Estetica</text>
  <text x="500" y="566" fill="#94a3b8" font-size="13" text-anchor="middle">Muy buena</text>
  <text x="730" y="566" fill="#94a3b8" font-size="13" text-anchor="middle">Muy buena</text>
  <text x="960" y="566" fill="#a855f7" font-size="13" font-weight="700" text-anchor="middle">Superior (APC)</text>

  <rect x="100" y="576" width="1000" height="30" rx="0" fill="#1e293b" opacity="0.5"/>
  <text x="250" y="596" fill="#94a3b8" font-size="12" text-anchor="middle">Precio Chile</text>
  <text x="500" y="596" fill="#94a3b8" font-size="13" text-anchor="middle">Comparable</text>
  <text x="730" y="596" fill="#94a3b8" font-size="13" text-anchor="middle">Comparable</text>
  <text x="960" y="596" fill="#94a3b8" font-size="13" text-anchor="middle">Comparable</text>

  <!-- Footer branding -->
  <rect x="0" y="616" width="1200" height="84" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="630" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="656" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="654" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="654" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="654" fill="#475569" font-size="11" text-anchor="end">Fuentes: Ivoclar IFU · Leinfelder 2005 · dentalprecios.cl</text>

  <!-- Key insight callout -->
  <rect x="40" y="675" width="1120" height="20" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="690" fill="#94a3b8" font-size="11" text-anchor="middle">Tetric N-Ceram destaca por modelado. Si priorizas estetica camaleon, Harmonize. Si priorizas pulido, Z350 XT. Precio similar entre las tres.</text>
</svg>
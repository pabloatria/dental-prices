<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="25" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Fresas Diamante: por que pagas distinto por la misma fresa</text>
  <rect x="200" y="60" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Central product icon -->
  <rect x="500" y="90" width="200" height="70" rx="12" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="2"/>
  <polygon points="580,105 600,95 620,105 600,150" fill="#a855f7" opacity="0.4" stroke="#a855f7" stroke-width="1"/>
  <text x="600" y="145" fill="#38bdf8" font-size="12" font-weight="700" text-anchor="middle">Fresa diamante estandar</text>

  <!-- Central label -->
  <text x="600" y="185" fill="#f8fafc" font-size="16" font-weight="800" text-anchor="middle">MISMA FRESA, DISTINTO PRECIO</text>
  <text x="600" y="205" fill="#94a3b8" font-size="13" text-anchor="middle">Mismo codigo, misma marca, mismo grano — diferente proveedor</text>

  <!-- Fan/spread lines from center to providers -->
  <!-- Provider 1 - Cheapest -->
  <line x1="500" y1="160" x2="120" y2="270" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <rect x="40" y="255" width="220" height="70" rx="10" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="150" y="280" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">PROVEEDOR A</text>
  <text x="150" y="305" fill="#22c55e" font-size="22" font-weight="800" text-anchor="middle">$1.200</text>

  <!-- Provider 2 -->
  <line x1="500" y1="150" x2="180" y2="380" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <rect x="60" y="365" width="220" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="170" y="390" fill="#38bdf8" font-size="11" font-weight="700" text-anchor="middle">PROVEEDOR B</text>
  <text x="170" y="415" fill="#38bdf8" font-size="22" font-weight="800" text-anchor="middle">$1.800</text>

  <!-- Provider 3 -->
  <line x1="530" y1="160" x2="350" y2="460" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
  <rect x="250" y="445" width="220" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="470" fill="#94a3b8" font-size="11" font-weight="700" text-anchor="middle">PROVEEDOR C</text>
  <text x="360" y="495" fill="#f8fafc" font-size="22" font-weight="800" text-anchor="middle">$2.200</text>

  <!-- Provider 4 -->
  <line x1="670" y1="160" x2="850" y2="460" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <rect x="730" y="445" width="220" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="840" y="470" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle">PROVEEDOR D</text>
  <text x="840" y="495" fill="#f59e0b" font-size="22" font-weight="800" text-anchor="middle">$2.800</text>

  <!-- Provider 5 -->
  <line x1="700" y1="150" x2="1020" y2="380" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <rect x="920" y="365" width="220" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1030" y="390" fill="#f97316" font-size="11" font-weight="700" text-anchor="middle">PROVEEDOR E</text>
  <text x="1030" y="415" fill="#f97316" font-size="22" font-weight="800" text-anchor="middle">$3.200</text>

  <!-- Provider 6 - Most expensive -->
  <line x1="700" y1="160" x2="1080" y2="270" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <rect x="940" y="255" width="220" height="70" rx="10" fill="#2a0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1050" y="280" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">PROVEEDOR F</text>
  <text x="1050" y="305" fill="#ef4444" font-size="22" font-weight="800" text-anchor="middle">$3.600</text>

  <!-- 200% spread callout -->
  <rect x="380" y="230" width="440" height="50" rx="25" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="262" fill="#ef4444" font-size="20" font-weight="800" text-anchor="middle">VARIANZA: 200% ($1.200 vs $3.600)</text>

  <!-- Bottom insight boxes -->
  <rect x="60" y="540" width="340" height="55" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="563" fill="#f59e0b" font-size="12" font-weight="700">EL MITO</text>
  <text x="80" y="583" fill="#94a3b8" font-size="12">"Siempre compro en el mismo proveedor"</text>

  <rect x="430" y="540" width="340" height="55" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="563" fill="#ef4444" font-size="12" font-weight="700">EL COSTO</text>
  <text x="450" y="583" fill="#94a3b8" font-size="12">Hasta $72.000 extra por caja de 30 fresas</text>

  <rect x="800" y="540" width="340" height="55" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
  <text x="820" y="563" fill="#38bdf8" font-size="12" font-weight="700">LA SOLUCION</text>
  <text x="820" y="583" fill="#94a3b8" font-size="12">Compara antes de cada compra en dentalprecios.cl</text>

  <!-- Footer branding -->
  <rect x="0" y="610" width="1200" height="90" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="628" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="654" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="652" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="652" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>

  <!-- Key insight callout -->
  <rect x="40" y="672" width="1120" height="24" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="689" fill="#94a3b8" font-size="12" text-anchor="middle">La lealtad al proveedor sin comparar precios puede costarte cientos de miles de pesos al ano</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="52" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="-0.5">¿Qué cemento de resina elegir?</text>
  <rect x="250" y="64" width="700" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Question node -->
  <rect x="400" y="90" width="400" height="50" rx="25" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
  <text x="600" y="121" fill="#38bdf8" font-size="16" font-weight="700" text-anchor="middle">¿Dónde va la restauración?</text>

  <!-- Branch lines -->
  <line x1="500" y1="140" x2="300" y2="185" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="140" x2="900" y2="185" stroke="#334155" stroke-width="2"/>

  <!-- Left: Anterior -->
  <rect x="150" y="185" width="300" height="42" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="212" fill="#f59e0b" font-size="15" font-weight="700" text-anchor="middle">ANTERIOR (estética)</text>

  <!-- Right: Posterior -->
  <rect x="750" y="185" width="300" height="42" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="900" y="212" fill="#f59e0b" font-size="15" font-weight="700" text-anchor="middle">POSTERIOR (función)</text>

  <!-- Left sub-question -->
  <line x1="300" y1="227" x2="300" y2="260" stroke="#334155" stroke-width="1.5"/>
  <rect x="150" y="260" width="300" height="36" rx="18" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1"/>
  <text x="300" y="283" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">¿Carilla fina y translúcida?</text>

  <!-- Left YES -->
  <line x1="220" y1="296" x2="180" y2="330" stroke="#334155" stroke-width="1.5"/>
  <text x="185" y="322" fill="#22c55e" font-size="12" font-weight="700">SÍ</text>

  <rect x="60" y="330" width="240" height="90" rx="10" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="355" fill="#22c55e" font-size="14" font-weight="800" text-anchor="middle">Variolink Esthetic LC</text>
  <text x="180" y="375" fill="#94a3b8" font-size="11" text-anchor="middle">Fotocurado · Ivocerin libre de aminas</text>
  <text x="180" y="393" fill="#64748b" font-size="11" text-anchor="middle">Desde $40.176</text>
  <text x="180" y="410" fill="#64748b" font-size="10" text-anchor="middle">Alt: NX3 LC · RelyX Veneer</text>

  <!-- Left NO -->
  <line x1="380" y1="296" x2="420" y2="330" stroke="#334155" stroke-width="1.5"/>
  <text x="405" y="322" fill="#ef4444" font-size="12" font-weight="700">NO</text>

  <rect x="320" y="330" width="240" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="355" fill="#e2e8f0" font-size="14" font-weight="800" text-anchor="middle">Variolink Esthetic DC</text>
  <text x="440" y="375" fill="#94a3b8" font-size="11" text-anchor="middle">Dual-cure · Anterior opaco/grueso</text>
  <text x="440" y="393" fill="#64748b" font-size="11" text-anchor="middle">Desde $106.223</text>
  <text x="440" y="410" fill="#64748b" font-size="10" text-anchor="middle">Alt: RelyX Universal</text>

  <!-- Right sub-question -->
  <line x1="900" y1="227" x2="900" y2="260" stroke="#334155" stroke-width="1.5"/>
  <rect x="750" y="260" width="300" height="36" rx="18" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1"/>
  <text x="900" y="283" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">¿Qué material cerámico?</text>

  <!-- Right: Disilicato -->
  <line x1="830" y1="296" x2="780" y2="330" stroke="#334155" stroke-width="1.5"/>
  <text x="785" y="322" fill="#38bdf8" font-size="11" font-weight="600">Disilicato</text>

  <rect x="640" y="330" width="240" height="90" rx="10" fill="#0f172a" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="760" y="355" fill="#38bdf8" font-size="14" font-weight="800" text-anchor="middle">Panavia V5</text>
  <text x="760" y="375" fill="#94a3b8" font-size="11" text-anchor="middle">Dual-cure · MDP · Alta adhesión</text>
  <text x="760" y="393" fill="#64748b" font-size="11" text-anchor="middle">$145.472 (kit Surdent)</text>
  <text x="760" y="410" fill="#64748b" font-size="10" text-anchor="middle">Alt: RelyX Universal + Scotchbond</text>

  <!-- Right: Zirconia -->
  <line x1="970" y1="296" x2="1020" y2="330" stroke="#334155" stroke-width="1.5"/>
  <text x="1000" y="322" fill="#38bdf8" font-size="11" font-weight="600">Zirconia</text>

  <rect x="920" y="330" width="240" height="90" rx="10" fill="#0f172a" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="1040" y="355" fill="#38bdf8" font-size="14" font-weight="800" text-anchor="middle">Panavia V5</text>
  <text x="1040" y="375" fill="#94a3b8" font-size="11" text-anchor="middle">MDP → enlace químico con ZrO₂</text>
  <text x="1040" y="393" fill="#64748b" font-size="11" text-anchor="middle">$145.472 (kit Surdent)</text>
  <text x="1040" y="410" fill="#64748b" font-size="10" text-anchor="middle">Alt: RelyX U200 (autoadhesivo)</text>

  <!-- Bottom row: Budget + Simplified -->
  <line x1="600" y1="420" x2="600" y2="460" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>

  <rect x="100" y="470" width="480" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="495" fill="#f59e0b" font-size="13" font-weight="700">PROTOCOLO SIMPLIFICADO (sin adhesivo previo)</text>
  <text x="120" y="515" fill="#e2e8f0" font-size="15" font-weight="800">RelyX U200</text>
  <text x="265" y="515" fill="#94a3b8" font-size="13">Autoadhesivo dual-cure · Desde $91.290</text>
  <text x="120" y="537" fill="#64748b" font-size="11">Alternativas: Maxcem Elite Chroma ($32.900) · BisCem ($39.980)</text>

  <rect x="620" y="470" width="480" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="640" y="495" fill="#f59e0b" font-size="13" font-weight="700">PRESUPUESTO AJUSTADO (volumen)</text>
  <text x="640" y="515" fill="#e2e8f0" font-size="15" font-weight="800">AllCem FGM</text>
  <text x="770" y="515" fill="#94a3b8" font-size="13">Dual-cure brasileño · Desde $28.000</text>
  <text x="640" y="537" fill="#64748b" font-size="11">Alternativa: Dual Force Maquira ($21.900)</text>

  <!-- Footer branding -->
  <rect x="0" y="580" width="1200" height="120" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="610" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="636" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="634" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="634" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="634" fill="#475569" font-size="11" text-anchor="end">Fuentes: Yankova et al. 2025 · Hardan et al. 2024 · Rohr et al. 2020</text>

  <!-- Key insight callout -->
  <rect x="40" y="655" width="1120" height="30" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="675" fill="#94a3b8" font-size="12" text-anchor="middle">Anterior → prioriza estabilidad de color (LC) · Posterior → prioriza adhesión (dual-cure + MDP) · Simplificado → autoadhesivo</text>
</svg>

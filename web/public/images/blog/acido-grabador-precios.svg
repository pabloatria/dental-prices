  <!-- Bar chart -->
  <!-- Bar 1: Potenza Attacco -->
  <text x="230" y="172" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="end">Potenza Attacco</text>
  <text x="230" y="186" fill="#64748b" font-size="10" text-anchor="end">Generico</text>
  <rect x="240" y="163" width="138" height="28" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="388" y="182" fill="#f8fafc" font-size="12" font-weight="700">$1.500</text>

  <!-- Bar 2: Indusbello -->
  <text x="230" y="222" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="end">Indusbello</text>

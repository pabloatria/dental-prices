  <line x1="240" y1="150" x2="240" y2="455" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <line x1="470" y1="150" x2="470" y2="455" stroke="#334155" stroke-width="0.5" stroke-dasharray="4" opacity="0.3"/>
  <line x1="700" y1="150" x2="700" y2="455" stroke="#334155" stroke-width="0.5" stroke-dasharray="4" opacity="0.3"/>
  <text x="240" y="468" fill="#475569" font-size="10" text-anchor="middle">$0</text>
  <text x="470" y="468" fill="#475569" font-size="10" text-anchor="middle">$2.500</text>
  <text x="700" y="468" fill="#475569" font-size="10" text-anchor="middle">$5.000</text>

  <!-- Bottom insight boxes -->
  <rect x="55" y="490" width="340" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="75" y="515" fill="#22c55e" font-size="13" font-weight="700">MEJOR VALOR</text>
  <text x="75" y="535" fill="#e2e8f0" font-size="15" font-weight="800">Potenza Attacco — $1.500</text>
  <text x="75" y="555" fill="#64748b" font-size="11">Acido fosforico 37% · Resultado clinico equivalente</text>

  <rect x="430" y="490" width="340" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="515" fill="#f59e0b" font-size="13" font-weight="700">RELACION CALIDAD-PRECIO</text>
  <text x="450" y="535" fill="#e2e8f0" font-size="15" font-weight="800">Condac 37 (FGM) — $2.500</text>
  <text x="450" y="555" fill="#64748b" font-size="11">Marca brasilena con amplia evidencia clinica</text>

  <rect x="805" y="490" width="340" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="825" y="515" fill="#ef4444" font-size="13" font-weight="700">PREMIUM</text>
  <text x="825" y="535" fill="#e2e8f0" font-size="15" font-weight="800">Ultra-Etch (Ultradent) — $4.500+</text>
  <text x="825" y="555" fill="#64748b" font-size="11">Viscosidad superior · Preferido por KOLs</text>

  <!-- Footer branding -->
  <rect x="0" y="590" width="1200" height="110" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="620" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="646" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="644" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="644" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="644" fill="#475569" font-size="11" text-anchor="end">Fuentes: Proveedores dentales Chile · dentalprecios.cl</text>

  <!-- Key insight callout -->
  <rect x="40" y="665" width="1120" height="28" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="684" fill="#94a3b8" font-size="12" text-anchor="middle">El acido grabador es un commodity: 35-37% H₃PO₄ en todas las marcas. La diferencia es precio, no rendimiento clinico.</text>
</svg>
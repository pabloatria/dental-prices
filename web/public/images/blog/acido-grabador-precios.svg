<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Acido Grabador Dental: Comparativa de Precios por Jeringa</text>
  <rect x="200" y="60" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="600" y="88" fill="#94a3b8" font-size="14" text-anchor="middle">Todos los productos contienen acido fosforico al 35-37% — principio activo identico</text>

  <!-- Callout box -->
  <rect x="780" y="108" width="370" height="70" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="965" y="134" fill="#38bdf8" font-size="15" font-weight="700" text-anchor="middle">Mismo principio activo,</text>
  <text x="965" y="154" fill="#38bdf8" font-size="15" font-weight="700" text-anchor="middle">distinto precio</text>
  <text x="965" y="172" fill="#64748b" font-size="11" text-anchor="middle">Varianza de precio superior al 200%</text>


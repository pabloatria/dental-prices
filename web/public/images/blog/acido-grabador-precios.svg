  <!-- Bar 6: Ultra-Etch (Ultradent) -->
  <text x="230" y="422" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="end">Ultra-Etch</text>
  <text x="230" y="436" fill="#64748b" font-size="10" text-anchor="end">Ultradent · Premium</text>

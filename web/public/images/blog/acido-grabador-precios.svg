  <text x="434" y="232" fill="#f8fafc" font-size="12" font-weight="700">$2.000</text>

  <!-- Bar 3: Condac 37 (FGM) -->
  <text x="230" y="272" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="end">Condac 37 (FGM)</text>
  <text x="230" y="286" fill="#64748b" font-size="10" text-anchor="end">Brasil</text>
  <rect x="240" y="263" width="230" height="28" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="480" y="282" fill="#f8fafc" font-size="12" font-weight="700">$2.500</text>

  <!-- Bar 4: Maquira -->
  <text x="230" y="322" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="end">Maquira</text>
  <text x="230" y="336" fill="#64748b" font-size="10" text-anchor="end">Brasil</text>

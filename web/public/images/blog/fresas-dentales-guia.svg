<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="25" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Fresas Dentales: tipos, precios y guia de compra</text>
  <rect x="200" y="60" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Two main columns -->
  <!-- DIAMOND Column -->
  <rect x="60" y="85" width="520" height="260" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <rect x="60" y="85" width="520" height="44" rx="12" fill="#a855f7" opacity="0.15"/>
  <text x="320" y="114" fill="#c084fc" font-size="17" font-weight="800" text-anchor="middle">FRESAS DIAMANTE</text>

  <!-- Diamond icon -->
  <polygon points="90,160 110,140 130,160 110,190" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="1"/>

  <text x="150" y="155" fill="#e2e8f0" font-size="13" font-weight="700">Abrasion por particulas de diamante</text>
  <text x="150" y="175" fill="#94a3b8" font-size="12">Desgaste rapido, corte agresivo</text>
  <text x="150" y="195" fill="#94a3b8" font-size="12">Ideal: preparaciones, contorneado de esmalte</text>
  <text x="150" y="215" fill="#94a3b8" font-size="12">Granos: grueso, medio, fino, ultrafino</text>

  <rect x="80" y="230" width="480" height="1" fill="#334155" opacity="0.5"/>

  <text x="80" y="255" fill="#f59e0b" font-size="12" font-weight="700">RANGO DE PRECIOS</text>
  <text x="80" y="278" fill="#22c55e" font-size="16" font-weight="800">$1.200</text>
  <text x="180" y="278" fill="#64748b" font-size="13">—</text>
  <text x="210" y="278" fill="#ef4444" font-size="16" font-weight="800">$5.500</text>
  <text x="310" y="278" fill="#64748b" font-size="12">por unidad</text>

  <text x="80" y="302" fill="#94a3b8" font-size="11">Marcas: KG Sorensen · Microdont · Komet</text>
  <text x="80" y="322" fill="#64748b" font-size="11">KG Sorensen desde $1.200 | Komet desde $3.800</text>

  <!-- CARBIDE Column -->
  <rect x="620" y="85" width="520" height="260" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="620" y="85" width="520" height="44" rx="12" fill="#0ea5e9" opacity="0.15"/>
  <text x="880" y="114" fill="#38bdf8" font-size="17" font-weight="800" text-anchor="middle">FRESAS CARBURO TUNGSTENO</text>

  <!-- Carbide icon -->
  <rect x="645" y="140" width="40" height="50" rx="4" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="1"/>
  <line x1="655" y1="145" x2="655" y2="185" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="665" y1="145" x2="665" y2="185" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="675" y1="145" x2="675" y2="185" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>

  <text x="700" y="155" fill="#e2e8f0" font-size="13" font-weight="700">Corte con hojas/filos de carburo</text>
  <text x="700" y="175" fill="#94a3b8" font-size="12">Corte limpio, menos vibracion</text>
  <text x="700" y="195" fill="#94a3b8" font-size="12">Ideal: remocion de caries, acabado</text>
  <text x="700" y="215" fill="#94a3b8" font-size="12">Filos: 6, 8, 12, 16, 30 hojas</text>

  <rect x="640" y="230" width="480" height="1" fill="#334155" opacity="0.5"/>

  <text x="640" y="255" fill="#f59e0b" font-size="12" font-weight="700">RANGO DE PRECIOS</text>
  <text x="640" y="278" fill="#22c55e" font-size="16" font-weight="800">$2.500</text>
  <text x="740" y="278" fill="#64748b" font-size="13">—</text>
  <text x="770" y="278" fill="#ef4444" font-size="16" font-weight="800">$8.750</text>
  <text x="870" y="278" fill="#64748b" font-size="12">por unidad</text>

  <text x="640" y="302" fill="#94a3b8" font-size="11">Marcas: KG Sorensen · Microdont · Komet · Meisinger</text>
  <text x="640" y="322" fill="#64748b" font-size="11">Multihojas (acabado) son las mas caras del rango</text>

  <!-- Monthly spend section -->
  <rect x="60" y="370" width="1080" height="70" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="395" fill="#f59e0b" font-size="14" font-weight="700">GASTO MENSUAL ESTIMADO EN FRESAS</text>
  <text x="80" y="420" fill="#e2e8f0" font-size="13">Consultorio general:</text>
  <text x="250" y="420" fill="#f8fafc" font-size="15" font-weight="800">$50.000 – $150.000 /mes</text>
  <text x="600" y="420" fill="#e2e8f0" font-size="13">Clinica con multiples sillones:</text>
  <text x="830" y="420" fill="#f8fafc" font-size="15" font-weight="800">$150.000 – $300.000 /mes</text>

  <!-- Individual vs Kit decision -->
  <rect x="60" y="465" width="520" height="90" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="492" fill="#22c55e" font-size="14" font-weight="700">COMPRA INDIVIDUAL</text>
  <text x="80" y="514" fill="#e2e8f0" font-size="13">Seleccion exacta de formas y granos que necesitas</text>
  <text x="80" y="534" fill="#94a3b8" font-size="12">Ideal si sabes exactamente cuales usas mas — sin desperdiciar fresas que no ocupas</text>

  <rect x="620" y="465" width="520" height="90" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="640" y="492" fill="#f59e0b" font-size="14" font-weight="700">COMPRA EN KIT</text>
  <text x="640" y="514" fill="#e2e8f0" font-size="13">Descuento por volumen — hasta 30% menos por unidad</text>
  <text x="640" y="534" fill="#94a3b8" font-size="12">Conviene si usas variedad de formas — atencion: muchos kits incluyen fresas que no usaras</text>

  <!-- Footer branding -->
  <rect x="0" y="590" width="1200" height="110" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="615" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="641" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="639" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="639" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="639" fill="#475569" font-size="11" text-anchor="end">Fuentes: Proveedores dentales Chile · dentalprecios.cl</text>

  <!-- Key insight callout -->
  <rect x="40" y="660" width="1120" height="30" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="680" fill="#94a3b8" font-size="12" text-anchor="middle">Diamante para preparacion agresiva · Carburo para acabado limpio · Compara precios unitarios antes de comprar kits</text>
</svg>
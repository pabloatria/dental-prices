<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Adhesivos Dentales: Generaciones y Precios en Chile</text>
  <rect x="200" y="60" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Timeline section -->
  <text x="600" y="92" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">EVOLUCION DE LOS SISTEMAS ADHESIVOS</text>

  <!-- Timeline bar -->
  <line x1="120" y1="130" x2="1080" y2="130" stroke="#334155" stroke-width="2"/>

  <!-- Gen 4-5: Etch-and-rinse -->
  <circle cx="240" cy="130" r="8" fill="#f59e0b"/>
  <rect x="120" y="148" width="280" height="72" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="168" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">4.ª y 5.ª Generacion</text>
  <text x="260" y="186" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Etch-and-Rinse</text>
  <text x="260" y="204" fill="#64748b" font-size="11" text-anchor="middle">Grabado + Primer + Adhesivo (2-3 pasos)</text>

  <!-- Gen 6-7: Self-etch -->
  <circle cx="580" cy="130" r="8" fill="#0ea5e9"/>
  <rect x="440" y="148" width="280" height="72" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="580" y="168" fill="#0ea5e9" font-size="13" font-weight="700" text-anchor="middle">6.ª y 7.ª Generacion</text>
  <text x="580" y="186" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Self-Etch</text>
  <text x="580" y="204" fill="#64748b" font-size="11" text-anchor="middle">Sin grabado acido separado (1-2 pasos)</text>

  <!-- Gen 8: Universal -->
  <circle cx="920" cy="130" r="8" fill="#22c55e"/>
  <rect x="780" y="148" width="280" height="72" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="920" y="168" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">8.ª Generacion</text>
  <text x="920" y="186" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Universal</text>
  <text x="920" y="204" fill="#64748b" font-size="11" text-anchor="middle">Multi-modo: etch-and-rinse o self-etch</text>

  <!-- Arrow indicators -->
  <text x="380" y="134" fill="#475569" font-size="18">&#x2192;</text>
  <text x="700" y="134" fill="#475569" font-size="18">&#x2192;</text>

  <!-- Divider -->
  <line x1="60" y1="245" x2="1140" y2="245" stroke="#334155" stroke-width="1" stroke-dasharray="6"/>
  <text x="600" y="272" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">TOP ADHESIVOS POR PRECIO EN CHILE</text>

  <!-- Product cards -->
  <!-- Card 1: Ambar Universal (Budget) -->
  <rect x="55" y="290" width="255" height="170" rx="10" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="55" y="290" width="255" height="32" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="75" y="312" fill="#22c55e" font-size="11" font-weight="700">MEJOR PRECIO</text>
  <text x="182" y="348" fill="#e2e8f0" font-size="17" font-weight="800" text-anchor="middle">Ambar Universal</text>
  <text x="182" y="368" fill="#64748b" font-size="12" text-anchor="middle">FGM · Universal (8.ª gen)</text>
  <rect x="105" y="380" width="155" height="32" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="182" y="401" fill="#22c55e" font-size="16" font-weight="800" text-anchor="middle">$11.990–$13.500</text>
  <text x="182" y="425" fill="#64748b" font-size="11" text-anchor="middle">MDP incluido · Excelente evidencia</text>
  <text x="182" y="445" fill="#475569" font-size="10" text-anchor="middle">Alternativa brasilena de alto valor</text>

  <!-- Card 2: Tetric N-Bond Universal -->
  <rect x="340" y="290" width="255" height="170" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="340" y="290" width="255" height="32" rx="10" fill="#0ea5e9" opacity="0.15"/>
  <text x="360" y="312" fill="#0ea5e9" font-size="11" font-weight="700">CALIDAD-PRECIO</text>
  <text x="467" y="348" fill="#e2e8f0" font-size="17" font-weight="800" text-anchor="middle">Tetric N-Bond</text>
  <text x="467" y="368" fill="#64748b" font-size="12" text-anchor="middle">Ivoclar · Universal (8.ª gen)</text>
  <rect x="385" y="380" width="165" height="32" rx="6" fill="#0ea5e9" opacity="0.15"/>
  <text x="467" y="401" fill="#38bdf8" font-size="16" font-weight="800" text-anchor="middle">$19.990–$21.200</text>
  <text x="467" y="425" fill="#64748b" font-size="11" text-anchor="middle">MDP · Compatible con composites Ivoclar</text>
  <text x="467" y="445" fill="#475569" font-size="10" text-anchor="middle">Ecosistema completo Tetric</text>

  <!-- Card 3: Clearfil SE Bond -->
  <rect x="625" y="290" width="255" height="170" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="625" y="290" width="255" height="32" rx="10" fill="#f59e0b" opacity="0.15"/>
  <text x="645" y="312" fill="#f59e0b" font-size="11" font-weight="700">GOLD STANDARD SELF-ETCH</text>
  <text x="752" y="348" fill="#e2e8f0" font-size="17" font-weight="800" text-anchor="middle">Clearfil SE Bond</text>
  <text x="752" y="368" fill="#64748b" font-size="12" text-anchor="middle">Kuraray · Self-etch (7.ª gen)</text>
  <rect x="670" y="380" width="165" height="32" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="752" y="401" fill="#f59e0b" font-size="16" font-weight="800" text-anchor="middle">$30.800–$32.500</text>
  <text x="752" y="425" fill="#64748b" font-size="11" text-anchor="middle">MDP original · Mayor evidencia a largo plazo</text>
  <text x="752" y="445" fill="#475569" font-size="10" text-anchor="middle">Referencia en investigacion</text>

  <!-- Card 4: Single Bond Universal -->
  <rect x="910" y="290" width="255" height="170" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="910" y="290" width="255" height="32" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="930" y="312" fill="#ef4444" font-size="11" font-weight="700">PREMIUM</text>
  <text x="1037" y="348" fill="#e2e8f0" font-size="17" font-weight="800" text-anchor="middle">Single Bond Universal</text>
  <text x="1037" y="368" fill="#64748b" font-size="12" text-anchor="middle">3M · Universal (8.ª gen)</text>
  <rect x="950" y="380" width="175" height="32" rx="6" fill="#ef4444" opacity="0.15"/>
  <text x="1037" y="401" fill="#ef4444" font-size="16" font-weight="800" text-anchor="middle">$22.500–$42.500</text>
  <text x="1037" y="425" fill="#64748b" font-size="11" text-anchor="middle">MDP + Vitrebond · Mayor varianza de precio</text>
  <text x="1037" y="445" fill="#475569" font-size="10" text-anchor="middle">$20.000 de diferencia entre proveedores</text>

  <!-- Price scale reference -->
  <rect x="55" y="480" width="1110" height="40" rx="6" fill="#0ea5e9" opacity="0.05"/>
  <text x="110" y="505" fill="#22c55e" font-size="14" font-weight="700">$11.990</text>
  <line x1="190" y1="500" x2="990" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <text x="1100" y="505" fill="#ef4444" font-size="14" font-weight="700">$42.500</text>
  <text x="590" y="505" fill="#64748b" font-size="11" text-anchor="middle">Rango de precios adhesivos universales en Chile (3.5x diferencia)</text>

  <!-- Footer branding -->
  <rect x="0" y="540" width="1200" height="160" rx="0" fill="#0f172a" opacity="0.5"/>
  <rect x="40" y="570" width="36" height="36" rx="8" fill="#0ea5e9"/>
  <text x="58" y="596" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">D</text>
  <text x="90" y="594" fill="#e2e8f0" font-size="18" font-weight="700">dentalprecios.cl</text>
  <text x="290" y="594" fill="#64748b" font-size="13">Precios actualizados Abril 2026</text>
  <text x="1160" y="594" fill="#475569" font-size="11" text-anchor="end">Fuentes: Proveedores dentales Chile · dentalprecios.cl</text>

  <!-- Key insight callout -->
  <rect x="40" y="615" width="1120" height="28" rx="4" fill="#0ea5e9" opacity="0.08"/>
  <text x="600" y="634" fill="#94a3b8" font-size="12" text-anchor="middle">Universales dominan el mercado · MDP es el monomero clave · Ambar Universal (FGM) ofrece la mejor relacion precio-evidencia</text>
</svg>
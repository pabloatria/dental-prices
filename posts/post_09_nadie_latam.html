<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadie en LatAm - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 60px;
            position: relative;
        }
        .search-label {
            font-size: 16px;
            color: #2B7BB9;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }
        .main-text {
            font-size: 48px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 30px;
            max-width: 900px;
        }
        .no-results {
            font-size: 32px;
            color: #AAAAAA;
            text-align: center;
            margin-bottom: 50px;
            font-weight: 500;
            line-height: 1.4;
            max-width: 900px;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #2B7BB9;
            margin: 40px auto;
        }
        .until-now {
            font-size: 36px;
            font-weight: 700;
            color: #2B7BB9;
            text-align: center;
            margin-bottom: 50px;
            font-style: italic;
        }
        .features {
            font-size: 20px;
            color: #FFFFFF;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            line-height: 1.4;
        }
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 700px;
            margin: 0 auto 35px;
        }
        .feature-item {
            font-size: 19px;
            color: #FFFFFF;
            font-weight: 500;
        }
        .feature-item:before {
            content: "·";
            color: #2B7BB9;
            margin-right: 12px;
            font-weight: bold;
        }
        .bottom-url {
            font-size: 22px;
            color: #2B7BB9;
            font-weight: 700;
            text-align: center;
        }
        .watermark {
            position: absolute;
            bottom: 25px;
            right: 35px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-label">Busca en Google</div>
        <div class="main-text">comparador de precios de insumos dentales</div>
        <div class="no-results">0 resultados. En ningún país de LatAm.</div>
        <div class="divider"></div>
        <div class="until-now">Hasta ahora.</div>
        <div class="features-list">
            <div class="feature-item">+7.800 productos</div>
            <div class="feature-item">Precios en tiempo real</div>
            <div class="feature-item">Información clínica</div>
        </div>
        <div class="bottom-url">dentalprecios.cl</div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

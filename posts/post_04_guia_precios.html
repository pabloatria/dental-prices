<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Precios - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 50px;
            position: relative;
        }
        .label {
            font-size: 14px;
            font-weight: 700;
            color: #2B7BB9;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
        }
        .main-question {
            font-size: 48px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 20px;
            max-width: 900px;
        }
        .subtitle {
            font-size: 26px;
            color: #1E90D0;
            text-align: center;
            margin-bottom: 45px;
            font-weight: 500;
        }
        .data-box {
            border: 2px solid #2B7BB9;
            background: rgba(43, 123, 185, 0.08);
            padding: 40px;
            border-radius: 8px;
            max-width: 700px;
            margin-bottom: 45px;
        }
        .data-item {
            font-size: 22px;
            color: #FFFFFF;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
        }
        .data-item:last-child {
            margin-bottom: 0;
        }
        .data-item.highlight {
            color: #1E90D0;
            font-weight: 700;
            font-size: 24px;
        }
        .cta {
            font-size: 20px;
            color: #FFFFFF;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
            max-width: 800px;
        }
        .cta-link {
            color: #2B7BB9;
            font-weight: 700;
        }
        .watermark {
            position: absolute;
            bottom: 25px;
            right: 35px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">Nuevo en el blog</div>
        <div class="main-question">¿Cuánto cuesta el composite dental en Chile?</div>
        <div class="subtitle">Escribimos la guía que no existía.</div>
        <div class="data-box">
            <div class="data-item">+15 tiendas analizadas</div>
            <div class="data-item highlight">$18.900 — $67.000 por jeringa</div>
            <div class="data-item">Hasta 40% de diferencia</div>
        </div>
        <div class="cta">Lee el artículo completo → <span class="cta-link">dentalprecios.cl/blog</span></div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

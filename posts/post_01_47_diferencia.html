<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>47% diferencia - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }
        .headline {
            font-size: 280px;
            font-weight: 900;
            color: #2B7BB9;
            line-height: 1;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -8px;
        }
        .subtext {
            font-size: 42px;
            font-weight: 600;
            color: #FFFFFF;
            text-align: center;
            margin-bottom: 40px;
            max-width: 900px;
        }
        .detail {
            font-size: 28px;
            color: #FFFFFF;
            opacity: 0.85;
            text-align: center;
            margin-bottom: 60px;
            font-weight: 400;
            max-width: 900px;
            line-height: 1.4;
        }
        .tagline {
            font-size: 32px;
            font-weight: 700;
            color: #1E90D0;
            text-align: center;
            margin-bottom: 80px;
            font-style: italic;
        }
        .watermark {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 16px;
            color: #FFFFFF;
            opacity: 0.6;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="headline">47%</div>
        <div class="subtext">de diferencia en precio.</div>
        <div class="detail">El mismo composite. La misma jeringa. 15 tiendas.</div>
        <div class="tagline">¿Compras sin comparar?</div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

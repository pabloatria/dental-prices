<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinión Impopular - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 60px;
            position: relative;
        }
        .label {
            font-size: 16px;
            font-weight: 700;
            color: #2B7BB9;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }
        .main-text {
            font-size: 54px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 50px;
            max-width: 900px;
            letter-spacing: -0.5px;
        }
        .subtext {
            font-size: 24px;
            color: #AAAAAA;
            text-align: center;
            font-weight: 400;
            line-height: 1.4;
            max-width: 800px;
        }
        .watermark {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">Opinión impopular</div>
        <div class="main-text">No necesitas el composite más caro para el 70% de tus restauraciones posteriores.</div>
        <div class="subtext">La diferencia está en el protocolo, no en el precio de la jeringa.</div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo que no te dice el catálogo - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 50px;
            position: relative;
        }
        .label {
            font-size: 14px;
            font-weight: 700;
            color: #2B7BB9;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            text-align: center;
        }
        .subject {
            font-size: 56px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            margin-bottom: 50px;
            line-height: 1.2;
        }
        .tip {
            font-size: 20px;
            color: #FFFFFF;
            margin-bottom: 30px;
            font-weight: 500;
            line-height: 1.5;
            padding: 20px 30px;
            border-left: 4px solid #2B7BB9;
            background: rgba(43, 123, 185, 0.05);
            max-width: 850px;
        }
        .tip-arrow {
            color: #2B7BB9;
            font-weight: 700;
            margin-right: 10px;
        }
        .bottom-text {
            font-size: 20px;
            color: #FFFFFF;
            text-align: center;
            margin-top: 40px;
            font-weight: 500;
            line-height: 1.4;
            max-width: 900px;
        }
        .bottom-link {
            color: #2B7BB9;
            font-weight: 700;
        }
        .watermark {
            position: absolute;
            bottom: 25px;
            right: 35px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">Lo que no te dice el catálogo</div>
        <div class="subject">Tu adhesivo dental.</div>
        <div class="tip">
            <span class="tip-arrow">→</span>El frotado activo 10-15s cambia la penetración en dentina
        </div>
        <div class="tip">
            <span class="tip-arrow">→</span>La evaporación insuficiente del solvente = falla adhesiva #1
        </div>
        <div class="tip">
            <span class="tip-arrow">→</span>El grosor de la capa importa más que la marca
        </div>
        <div class="bottom-text">Tips clínicos reales en cada producto. <span class="bottom-link">dentalprecios.cl</span></div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

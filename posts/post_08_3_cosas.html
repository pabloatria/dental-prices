<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Cosas - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 50px;
            position: relative;
        }
        .header {
            margin-bottom: 60px;
            text-align: center;
        }
        .header-number {
            font-size: 64px;
            font-weight: 900;
            color: #2B7BB9;
            display: inline-block;
            margin-right: 15px;
        }
        .header-text {
            font-size: 52px;
            font-weight: 700;
            color: #FFFFFF;
            display: inline-block;
            line-height: 1.2;
        }
        .items {
            max-width: 900px;
            width: 100%;
        }
        .item {
            margin-bottom: 40px;
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        .item-number {
            font-size: 60px;
            font-weight: 900;
            color: #2B7BB9;
            line-height: 1;
            min-width: 70px;
            text-align: center;
        }
        .item-text {
            font-size: 28px;
            font-weight: 600;
            color: #FFFFFF;
            line-height: 1.4;
            padding-top: 8px;
        }
        .bottom-cta {
            font-size: 22px;
            color: #FFFFFF;
            text-align: center;
            margin-top: 50px;
            font-weight: 600;
            line-height: 1.4;
            max-width: 900px;
        }
        .bottom-link {
            color: #2B7BB9;
            font-weight: 700;
        }
        .watermark {
            position: absolute;
            bottom: 25px;
            right: 35px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-number">3</span>
            <span class="header-text">COSAS</span>
        </div>
        <div style="font-size: 26px; color: #AAAAAA; text-align: center; margin-bottom: 50px; font-weight: 500; max-width: 900px;">que deberías saber antes de comprar insumos online</div>
        <div class="items">
            <div class="item">
                <div class="item-number">1</div>
                <div class="item-text">Los precios varían hasta 50% entre tiendas — por el mismo producto.</div>
            </div>
            <div class="item">
                <div class="item-number">2</div>
                <div class="item-text">La ficha técnica rara vez está completa.</div>
            </div>
            <div class="item">
                <div class="item-number">3</div>
                <div class="item-text">No existía un comparador de insumos dentales. Hasta ahora.</div>
            </div>
        </div>
        <div class="bottom-cta"><span class="bottom-link">dentalprecios.cl</span> — la información que faltaba.</div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cuánto gastas en composite? - DentalPrecios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #1A2332 0%, #0F1621 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            position: relative;
        }
        .top-question {
            font-size: 36px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            margin-bottom: 45px;
            max-width: 900px;
        }
        .comparison-boxes {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
        }
        .box {
            flex: 1;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            min-width: 320px;
        }
        .box-left {
            background: rgba(180, 100, 100, 0.12);
            border: 2px solid rgba(180, 100, 100, 0.3);
        }
        .box-right {
            background: rgba(43, 123, 185, 0.12);
            border: 2px solid #2B7BB9;
        }
        .box-title {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }
        .box-left .box-title {
            color: #E07070;
        }
        .box-right .box-title {
            color: #2B7BB9;
        }
        .box-calculation {
            font-size: 16px;
            color: #FFFFFF;
            margin-bottom: 15px;
            font-weight: 500;
            line-height: 1.6;
        }
        .box-result {
            font-size: 24px;
            font-weight: 700;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }
        .box-left .box-result {
            color: #E07070;
        }
        .box-right .box-result {
            color: #1E90D0;
        }
        .savings {
            font-size: 26px;
            font-weight: 700;
            color: #2B7BB9;
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(43, 123, 185, 0.1);
            border-left: 5px solid #2B7BB9;
            max-width: 900px;
        }
        .bottom-text {
            font-size: 20px;
            color: #FFFFFF;
            text-align: center;
            font-weight: 500;
            font-style: italic;
        }
        .watermark {
            position: absolute;
            bottom: 25px;
            right: 35px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-question">¿Cuánto gastas en composite al mes?</div>
        <div class="comparison-boxes">
            <div class="box box-left">
                <div class="box-title">Sin comparar</div>
                <div class="box-calculation">12 jeringas × $45.000</div>
                <div class="box-calculation">= $540.000/mes</div>
                <div class="box-result">$6.480.000/año</div>
            </div>
            <div class="box box-right">
                <div class="box-title">Con DentalPrecios</div>
                <div class="box-calculation">12 jeringas × $28.000</div>
                <div class="box-calculation">= $336.000/mes</div>
                <div class="box-result">$4.032.000/año</div>
            </div>
        </div>
        <div class="savings">Ahorro: $2.448.000/año</div>
        <div class="bottom-text">Y eso es solo composite.</div>
        <div class="watermark">dentalprecios.cl</div>
    </div>
</body>
</html>

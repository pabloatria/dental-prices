<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- Refined DP monogram — elegant ligature, shared stem -->
  <g transform="translate(28, 28)">
    <!-- Shared vertical stem -->
    <line x1="42" y1="0" x2="42" y2="84" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>

    <!-- D bowl — sweeping arc from top to bottom of stem -->
    <path d="M 42 0 C 82 0, 96 18, 96 42 C 96 66, 82 84, 42 84"
          fill="none" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>

    <!-- P bowl — elegant curve from top, closing at midpoint -->
    <path d="M 42 0 C 68 0, 74 4, 74 20 C 74 36, 68 40, 42 40"
          fill="none" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>
  </g>
</svg>
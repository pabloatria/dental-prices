name: Daily Price Scrape

on:
  schedule:
    # Runs at 04:00 UTC (01:00 Chile time), then random sleep adds 0-4h
    # Effective range: 01:00 - 05:00 Chile time (UTC-3)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Random delay (0-4 hours)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 14400))
          echo "Sleeping for $DELAY seconds ($(($DELAY / 3600))h $((($DELAY % 3600) / 60))m)"
          sleep $DELAY

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scrapers
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scrapers
          python main.py

      - name: Revalidate ISR cache
        if: success()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/revalidate.json -w '%{http_code}' \
            -X POST "https://www.dentalprecios.cl/api/revalidate" \
            -H "Authorization: Bearer ${CRON_SECRET}")
          BODY=$(cat /tmp/revalidate.json)
          echo "Revalidation response: HTTP ${HTTP_CODE} — ${BODY}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::warning::ISR revalidation failed with HTTP ${HTTP_CODE}: ${BODY}"
          fi

      - name: Notify IndexNow (Bing/Yandex)
        if: always()
        run: |
          curl -s -X POST https://www.dentalprecios.cl/api/indexnow \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "IndexNow notification failed (non-critical)"

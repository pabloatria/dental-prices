name: Daily Price Scrape

on:
  schedule:
    # Runs at 04:00 UTC (01:00 Chile time), then random sleep adds 0-4h
    # Effective range: 01:00 - 05:00 Chile time (UTC-3)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Random delay (0-4 hours)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 14400))
          echo "Sleeping for $DELAY seconds ($(($DELAY / 3600))h $((($DELAY % 3600) / 60))m)"
          sleep $DELAY

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scrapers
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scrapers
          python main.py
